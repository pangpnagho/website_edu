<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>유튜브 쇼츠 하이라이터</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: #fff; padding: 40px 20px; margin: 0; }
        h2 { color: #ff4757; }
        .container { max-width: 500px; margin: 0 auto 20px auto; background: #1e1e1e; padding: 20px; border-radius: 12px; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: none; box-sizing: border-box; }
        input { background: #2f3542; color: #fff; text-align: center; font-size: 15px; }
        .time-inputs { display: flex; gap: 15px; margin: 10px 0; }
        .time-group { flex: 1; text-align: left; }
        .time-group label { font-size: 13px; color: #aaa; display: block; margin-bottom: 5px; }
        button { background: #ff4757; color: #fff; font-weight: bold; cursor: pointer; font-size: 16px; }
        #status { margin-top: 15px; color: #ffa502; font-size: 14px; }
        
        /* 📱 9:16 쇼츠 프레임 마스킹 */
        .shorts-container {
            display: none;
            position: relative;
            width: 315px;
            height: 560px;
            margin: 30px auto;
            overflow: hidden;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            background: #000;
        }
        /* 가로 16:9 영상을 세로 9:16 크기에 맞추기 위해 꽉 차게 중앙 확대 */
        #player {
            position: absolute;
            top: 0;
            left: 50%;
            width: 996px; /* 560 * 1.77 */
            height: 560px;
            transform: translateX(-50%);
        }
    </style>
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>

    <h2>✂️ 유튜브 쇼츠 하이라이터 (즉시 구동형)</h2>
    <p>주소와 시:분:초를 입력하면 해당 하이라이트 구간을 쇼츠 비율로 무한 반복 재생합니다.</p>

    <div class="container">
        <input type="text" id="videoUrl" placeholder="유튜브 영상 주소 입력" value="https://www.youtube.com/watch?v=MKX5W7mGUzo">

        <div class="time-inputs">
            <div class="time-group">
                <label>시작 시간 (시:분:초)</label>
                <input type="text" id="startTime" placeholder="00:11:38" value="00:11:38">
            </div>
            <div class="time-group">
                <label>종료 시간 (시:분:초)</label>
                <input type="text" id="endTime" placeholder="00:11:53" value="00:11:53">
            </div>
        </div>

        <button onclick="playShortsSegment()">하이라이트 쇼츠 재생</button>
        <div id="status">준비 완료. 정보를 입력한 뒤 버튼을 누르세요.</div>
    </div>

    <div class="shorts-container" id="shortsWrapper">
        <div id="player"></div>
    </div>

    <script>
        let player;
        let startSec = 0;
        let endSec = 0;
        let checkInterval;

        function extractVideoId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function timeToSeconds(timeStr) {
            const parts = timeStr.trim().split(':');
            if (parts.length !== 3) return null;
            return (parseInt(parts[0], 10) * 3600) + (parseInt(parts[1], 10) * 60) + parseInt(parts[2], 10);
        }

        function playShortsSegment() {
            const url = document.getElementById('videoUrl').value;
            const videoId = extractVideoId(url);
            const startStr = document.getElementById('startTime').value;
            const endStr = document.getElementById('endTime').value;
            const statusDiv = document.getElementById('status');

            startSec = timeToSeconds(startStr);
            endSec = timeToSeconds(endStr);

            if (!videoId || startSec === null || endSec === null || (endSec - startSec) <= 0) {
                alert('유튜브 주소와 시간 입력(00:00:00 형식)을 정확히 확인해 주세요.');
                return;
            }

            clearInterval(checkInterval);
            statusDiv.innerText = `🔄 ${startStr} ~ ${endStr} 구간 하이라이트 매칭 중...`;
            document.getElementById('shortsWrapper').style.display = 'block';

            if (player && typeof player.loadVideoById === 'function') {
                player.loadVideoById({
                    videoId: videoId,
                    startSeconds: startSec
                });
                startLoopCheck();
            } else {
                // 플레이어 최초 생성
                player = new YT.Player('player', {
                    height: '560',
                    width: '996',
                    videoId: videoId,
                    playerVars: {
                        'autoplay': 1,
                        'controls': 0, // 쇼츠 연출을 위해 컨트롤바 제거
                        'rel': 0,
                        'modestbranding': 1,
                        'start': startSec
                    },
                    events: {
                        'onStateChange': onPlayerStateChange,
                        'onReady': () => {
                            statusDiv.innerText = "✨ 하이라이트 구간 무한 루프 가동 중!";
                            startLoopCheck();
                        }
                    }
                });
            }
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                startLoopCheck();
            }
        }

        // 재생 시간이 설정한 종료 시간을 넘어가면 다시 시작 시간으로 되돌리는 모니터링 로직
        function startLoopCheck() {
            clearInterval(checkInterval);
            checkInterval = setInterval(() => {
                if (player && typeof player.getCurrentTime === 'function') {
                    const currentTime = player.getCurrentTime();
                    if (currentTime >= endSec || currentTime < startSec) {
                        player.seekTo(startSec);
                    }
                }
            }, 300);
        }
    </script>
</body>
</html>
