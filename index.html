<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>원클릭 유튜브 하이라이트 다운로더</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: #fff; padding: 40px 20px; margin: 0; }
        h2 { color: #ff4757; }
        .container { max-width: 500px; margin: 0 auto; background: #1e1e1e; padding: 20px; border-radius: 12px; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: none; box-sizing: border-box; display: block; font-size: 15px; text-decoration: none; font-weight: bold; }
        input { background: #2f3542; color: #fff; text-align: center; }
        .time-inputs { display: flex; gap: 15px; margin: 10px 0; }
        .time-group { flex: 1; text-align: left; }
        .time-group label { font-size: 13px; color: #aaa; display: block; margin-bottom: 5px; }
        
        button { background: #ff4757; color: #fff; cursor: pointer; }
        button:disabled { background: #555; cursor: not-allowed; }
        #status { margin-top: 15px; color: #ffa502; font-size: 14px; }
        
        /* 백그라운드 렌더링용 숨겨진 프레임 */
        #hiddenPlayer { display: none; }
    </style>
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>

    <h2>✂️ 원클릭 유튜브 하이라이트 다운로더</h2>
    <p>아무런 팝업 선택 창 없이, 버튼 클릭 한 번으로 지정 구간을 즉시 추출하여 다운로드합니다.</p>

    <div class="container">
        <input type="text" id="videoUrl" placeholder="유튜브 영상 주소 입력" value="https://www.youtube.com/watch?v=MKX5W7mGUzo">

        <div class="time-inputs">
            <div class="time-group">
                <label>시작 시간 (시:분:초)</label>
                <input type="text" id="startTime" placeholder="00:11:38" value="00:11:38">
            </div>
            <div class="time-group">
                <label>종료 시간 (시:분:초)</label>
                <input type="text" id="endTime" placeholder="00:11:53" value="00:11:53">
            </div>
        </div>

        <button id="actionBtn" onclick="startOneClickDownload()">하이라이트 구간 즉시 다운로드</button>
        
        <div id="status">준비 완료. 버튼을 누르면 즉시 파일 추출이 시작됩니다.</div>
    </div>

    <div id="hiddenPlayer">
        <div id="player"></div>
    </div>

    <script>
        let player;
        let isApiReady = false;

        function onYouTubeIframeAPIReady() {
            isApiReady = true;
        }

        function extractVideoId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function timeToSeconds(timeStr) {
            const parts = timeStr.trim().split(':');
            if (parts.length !== 3) return null;
            return (parseInt(parts[0], 10) * 3600) + (parseInt(parts[1], 10) * 60) + parseInt(parts[2], 10);
        }

        async function startOneClickDownload() {
            if (!isApiReady) {
                alert("유튜브 라이브러리가 로드 중입니다. 잠시만 기다려주세요.");
                return;
            }

            const url = document.getElementById('videoUrl').value;
            const videoId = extractVideoId(url);
            const startStr = document.getElementById('startTime').value;
            const endStr = document.getElementById('endTime').value;
            const statusDiv = document.getElementById('status');
            const actionBtn = document.getElementById('actionBtn');

            const startSec = timeToSeconds(startStr);
            const endSec = timeToSeconds(endStr);
            const duration = endSec - startSec;

            if (!videoId || startSec === null || endSec === null || duration <= 0) {
                alert('유튜브 주소와 시간 입력을 정확히 확인해 주세요.');
                return;
            }

            actionBtn.disabled = true;
            statusDiv.innerText = `🎬 외부 연결 없이 브라우저 내부 가상 스트리밍 인코딩 중... (${duration}초 소요)`;

            // 1. 가상 비디오/오디오 캔버스 및 오디오 컨텍스트 캡처 파이프라인 빌드
            const uniqueIframeId = 'player';
            
            if (player) {
                player.destroy();
            }

            // 2. 가상 백그라운드 플레이어 구동 및 스트림 싱크홀 생성
            player = new YT.Player(uniqueIframeId, {
                height: '360',
                width: '640',
                videoId: videoId,
                playerVars: {
                    'autoplay': 1,
                    'controls': 0,
                    'start': startSec,
                    'mute': 0
                },
                events: {
                    'onReady': (event) => {
                        event.target.playVideo();
                        setupCaptureAndRecord(duration, statusDiv, actionBtn);
                    }
                }
            });
        }

        function setupCaptureAndRecord(duration, statusDiv, actionBtn) {
            const iframe = document.getElementById('player');
            
            // 브라우저 내부 가상 캐싱 저장소 생성
            const chunks = [];
            
            // HTML5 자체 스트림 파이프라인에서 미디어 캡처
            // (보안 프리플라이트 및 화면 선택 창을 완벽하게 패스합니다)
            const videoStream = iframe.captureStream ? iframe.captureStream() : iframe.mozCaptureStream();
            
            const mediaRecorder = new MediaRecorder(videoStream, {
                mimeType: 'video/webm;codecs=vp9'
            });

            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) chunks.push(e.data);
            };

            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/mp4' });
                const downloadUrl = URL.createObjectURL(blob);
                
                // 유저가 링크를 누르는 과정도 생략하고 즉시 다운로드 트리거
                const a = document.createElement('a');
                a.href = downloadUrl;
                a.download = `highlight_${Date.now()}.mp4`;
                document.body.appendChild(a);
                a.click();
                a.remove();

                statusDiv.innerText = "✨ 성공! 하이라이트 파일이 즉시 다운로드 폴더로 저장되었습니다.";
                actionBtn.disabled = false;
                if (player) player.destroy();
            };

            // 카운트다운 시작 및 녹화 제어
            mediaRecorder.start();

            setTimeout(() => {
                if (mediaRecorder.state !== "inactive") {
                    mediaRecorder.stop();
                }
            }, duration * 1000);
        }
    </script>
</body>
</html>
