<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudflare 유튜브 하이라이트 다운로더</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: #fff; padding: 40px 20px; }
        h2 { color: #ff4757; }
        .container { max-width: 500px; margin: 0 auto; background: #1e1e1e; padding: 20px; border-radius: 12px; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: none; box-sizing: border-box; }
        input { background: #2f3542; color: #fff; text-align: center; }
        .time-inputs { display: flex; gap: 15px; margin: 10px 0; }
        .time-group { flex: 1; text-align: left; }
        .time-group label { font-size: 13px; color: #aaa; display: block; margin-bottom: 5px; }
        button { background: #ff4757; color: #fff; font-weight: bold; cursor: pointer; margin-top: 15px; }
        button:disabled { background: #555; cursor: not-allowed; }
        #downloadLink { display: none; margin-top: 20px; padding: 12px; background: #2ed573; color: white; text-decoration: none; border-radius: 6px; font-weight: bold; display: none; text-align: center; }
        #status { margin-top: 15px; color: #ffa502; font-size: 14px; }
    </style>
</head>
<body>

    <h2>✂️ 유튜브 하이라이트 다운로더</h2>
    <p>Cloudflare Workers 시스템을 거쳐 에러 없이 하이라이트 영상을 추출합니다.</p>

    <div class="container">
        <input type="text" id="videoUrl" placeholder="유튜브 영상 주소 입력">

        <div class="time-inputs">
            <div class="time-group">
                <label>시작 시간 (시:분:초)</label>
                <input type="text" id="startTime" placeholder="00:11:38" value="00:11:38">
            </div>
            <div class="time-group">
                <label>종료 시간 (시:분:초)</label>
                <input type="text" id="endTime" placeholder="00:11:53" value="00:11:53">
            </div>
        </div>

        <button id="processBtn" onclick="processVideo()">영상 자르기 및 다운로드 링크 생성</button>
        <div id="status">준비 완료. 정보를 입력해 주세요.</div>
        <a id="downloadLink" href="#" target="_blank">📥 잘라낸 하이라이트 다운로드</a>
    </div>

    <script>
        // 💡 [중요] 배포 완료 후 발급받은 본인의 Cloudflare Worker 주소 주입구
        const WORKER_URL = "https://website-edu-aju.pages.dev"; 

        function timeToSeconds(timeStr) {
            const parts = timeStr.trim().split(':');
            if (parts.length !== 3) return null;
            return (parseInt(parts[0], 10) * 3600) + (parseInt(parts[1], 10) * 60) + parseInt(parts[2], 10);
        }

        async function processVideo() {
            const url = document.getElementById('videoUrl').value;
            const startStr = document.getElementById('startTime').value;
            const endStr = document.getElementById('endTime').value;
            const statusDiv = document.getElementById('status');
            const btn = document.getElementById('processBtn');
            const downloadLink = document.getElementById('downloadLink');

            const start = timeToSeconds(startStr);
            const end = timeToSeconds(endStr);
            if (!url || start === null || end === null || (end - start) <= 0) {
                alert('유튜브 주소와 시간 입력을 다시 확인해 주세요 (00:00:00 형식)');
                return;
            }

            if(WORKER_URL.includes("본인의-worker-이름")) {
                alert("코드 상단의 WORKER_URL 변수에 실제 Cloudflare Worker 주소를 먼저 넣어주셔야 작동합니다!");
                return;
            }

            btn.disabled = true;
            downloadLink.style.display = 'none';
            statusDiv.innerText = "🎬 Cloudflare Worker에서 초고속으로 하이라이트를 추출하는 중...";

            try {
                const response = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, start, end })
                });

                const data = await response.json();

                if (data.success && data.downloadUrl) {
                    statusDiv.innerText = "✨ 추출 성공! 아래 버튼을 누르면 다운로드됩니다.";
                    downloadLink.href = data.downloadUrl;
                    downloadLink.style.display = 'block';
                } else {
                    throw new Error(data.message || "추출 실패");
                }
            } catch (err) {
                console.error(err);
                statusDiv.innerText = "❌ 에러 발생: 지원하지 않는 영상 형식이거나 API 일시적 오류입니다.";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
